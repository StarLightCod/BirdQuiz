
name: bird_quiz
description: Викторина по определению птиц
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  path: ^1.8.3
  http: ^1.2.0
  audioplayers: ^6.1.0
  file_picker: ^6.2.1 # Обновленная версия
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  flutter_colorpicker: ^1.1.0 # <-- ВЕРНИТЕ ЭТУ СТРОКУ

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/

# Настройки для генерации иконок
flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    icon_path: "assets/images/icon.png"
  linux:
    generate: true
    icon_path: "assets/images/icon.png"
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#141C18"
    theme_color: "#141C18"
  macos:
    generate: true
    image_path: "assets/images/icon.png"