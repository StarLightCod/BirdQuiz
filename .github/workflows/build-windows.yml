name: Build Windows

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Remove old Windows folder
        run: if (Test-Path windows) { Remove-Item -Recurse -Force windows }

      - name: Create fresh Windows platform
        run: flutter create --project-name bird_quiz --platforms=windows .

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BirdQuiz-Windows
          path: build/windows/x64/runner/Release/
